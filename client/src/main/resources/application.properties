micronaut.application.name=remoteclient

client.rootpath=D:/GameDevelopment/remoteclient/client
client.logpath=${client.rootpath}/logs
client.dataini=DATA.INI
client.autoextract=true
client.enablesearch=true
client.cache.max-files=5000
client.cache.max-memory-mb=1024
client.cache.warmup.enabled=true
client.cache.warmup.limit=500
client.public-url=${CLIENT_PUBLIC_URL:http://localhost:3338}

wsproxy.enabled=${ENABLE_WSPROXY:true}
wsproxy.allowed-targets=${WS_ALLOWED_TARGETS:127.0.0.1:6900,127.0.0.1:6121,127.0.0.1:5121}
